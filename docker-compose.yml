version: "3.9"

services:
  social_postgres:
    image: postgres:15
    container_name: social_postgres
    restart: always
    environment:
      POSTGRES_USER: social_admin
      POSTGRES_PASSWORD: social_12345_change
      POSTGRES_DB: social_ai
    ports:
      - "5433:5432"
    volumes:
      - social_postgres_data:/var/lib/postgresql/data

  social_backend:
    image: node:20-alpine
    container_name: social_backend
    working_dir: /app
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "3011:3011"
    depends_on:
      - social_postgres
    command: sh -c "npm install && npm run dev"

  social_frontend:
    image: node:20-alpine
    container_name: social_frontend
    working_dir: /app
    restart: always
    volumes:
      - ./frontend:/app
    ports:
      - "3010:3010"
    depends_on:
      - social_backend
    command: sh -c "npm install && npm run dev"

volumes:
  social_postgres_data:
